<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Spirit Radio - Análisis Cuántico</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #container { width: 100vw; height: 100vh; }
        
        #btnClose {
            position: fixed; top: calc(20px + env(safe-area-inset-top)); right: 20px;
            background: rgba(255, 0, 0, 0.1); color: #ff3333; border: 2px solid #ff3333; cursor: pointer;
            width: 32px; height: 32px; z-index: 9999; border-radius: 50%; font-weight: bold; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
        }

        .ui-overlay { position: absolute; top: calc(25px + env(safe-area-inset-top)); left: 20px; color: #0ff; pointer-events: none; text-transform: uppercase; font-size: 20px; text-shadow: 0 0 10px #0ff; z-index: 10; }
        .data-panel { position: absolute; color: rgba(0, 255, 255, 0.5); font-size: 11px; pointer-events: none; z-index: 5; line-height: 1.4; min-width: 120px; }
        .mid-left { top: 40%; left: 15px; }
        .mid-right { top: 40%; right: 15px; text-align: right; }
        .highlight { color: #ff3333; font-weight: bold; text-shadow: 0 0 5px #ff0000; }
    </style>
</head>
<body>
    <button id="btnClose" onclick="window.close()">X</button>
    <div class="ui-overlay">DETECTOR: <span id="status">BARRIDO RF</span></div>
    
    <div class="data-panel mid-left" id="panel1">Iniciando...</div>
    <div class="data-panel mid-right" id="panel2">Esperando...</div>

    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, waves = [], sparks = [];
        let vol = 0, isSpeaking = false, isPaused = true;
        const colors = [0xff4444, 0x44ff44, 0x4488ff, 0xffcc00];

        function genData() { return (Math.random() * 100).toFixed(8); }

        function loopData() {
            if (!isPaused) {
                const p1 = document.getElementById('panel1');
                const p2 = document.getElementById('panel2');
                const noisePrefix = isSpeaking ? "<span class='highlight'>ANOMALÍA</span><br>" : "SENS: " + genData().substring(0,8) + "<br>";
                p1.innerHTML = noisePrefix + "EM_F: " + genData() + "<br>VOLT: " + (vol/100 + Math.random()*0.01).toFixed(6);
                p2.innerHTML = "GAIN: " + (vol + Math.random()).toFixed(2) + "db<br>LNCY: " + (Math.random()*0.01).toFixed(6) + "<br>SYNC: " + Date.now().toString().slice(-6);
            }
            setTimeout(loopData, 100);
        }

        function triggerSpark(x, y, isPara) {
            const spark = sparks.find(s => !s.mesh.visible);
            if (spark) {
                spark.mesh.position.set(x, y, 0);
                spark.mesh.visible = true;
                spark.life = 1.0;
                // Si es paranormal: grande y rojo. Si es normal: pequeño y tenue blanco
                const size = isPara ? 0.3 : 0.05;
                spark.mesh.scale.set(size, size, size);
                spark.mesh.material.color.set(isPara ? 0xff0000 : 0xffffff);
                spark.mesh.material.opacity = isPara ? 0.8 : 0.2;
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);
            
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.2, 0.4, 0.1);
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            composer.addPass(bloomPass);

            for (let i = 0; i < 4; i++) {
                const points = [];
                for (let x = -8; x < 8; x += 0.2) points.push(new THREE.Vector3(x, 0, 0));
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geometry, new THREE.LineBasicMaterial({ color: colors[i], transparent: true, opacity: 0.7 }));
                line.userData = { fStep: Math.random()*50, aStep: Math.random()*50, speed: 0.003 + (i*0.001) };
                scene.add(line);
                waves.push(line);
            }

            for (let i = 0; i < 50; i++) {
                const mesh = new THREE.Mesh(new THREE.CircleGeometry(0.5, 8), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true }));
                mesh.visible = false;
                scene.add(mesh);
                sparks.push({ mesh, life: 0 });
            }
            loopData();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPaused) { composer.render(); return; }

            const t = Date.now();
            waves.forEach((line, i) => {
                const pos = line.geometry.attributes.position.array;
                line.userData.fStep += 0.012;
                line.userData.aStep += 0.006;
                const freq = (2 + i) + Math.sin(line.userData.fStep) * 2;
                const rawAmp = (vol * 0.15) + 0.3 + (Math.cos(line.userData.aStep) * 0.4);
                const amp = Math.min(rawAmp, 1.5); 

                for (let j = 0; j < pos.length; j += 3) {
                    const x = pos[j];
                    const mask = Math.cos(x / 5.5);
                    let y = Math.sin(x * freq + (t * line.userData.speed)) * amp * mask;
                    if (isSpeaking) y += (Math.random() - 0.5) * 0.4;
                    y = Math.max(-2.5, Math.min(2.5, y));
                    pos[j + 1] = THREE.MathUtils.lerp(pos[j + 1], y, 0.2);
                }
                line.geometry.attributes.position.needsUpdate = true;
            });

            for (let i = 0; i < waves.length - 1; i++) {
                const posA = waves[i].geometry.attributes.position.array;
                const posB = waves[i+1].geometry.attributes.position.array;
                for (let j = 0; j < posA.length; j += 3) {
                    if (Math.abs(posA[j+1] - posB[j+1]) < 0.05) {
                        triggerSpark(posA[j], posA[j+1], isSpeaking);
                    }
                }
            }

            sparks.forEach(s => {
                if (s.mesh.visible) {
                    s.life -= 0.1;
                    s.mesh.material.opacity *= 0.9;
                    if (s.life <= 0) s.mesh.visible = false;
                }
            });

            composer.render();
        }

        window.onmessage = (e) => {
            if(e.data.type === 'AUDIO_UPDATE') {
                isPaused = false;
                vol = e.data.volume || 0;
                isSpeaking = e.data.isSpeaking;
                document.getElementById('status').innerText = isSpeaking ? "¡ENTIDAD!" : "BARRIDO RF";
            }
            if(e.data.type === 'STOP_ALL') {
                isPaused = true;
                document.getElementById('status').innerText = "OFFLINE";
            }
        };

        init();
        animate();
    </script>
</body>
</html>
